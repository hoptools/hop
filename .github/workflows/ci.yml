name: HopUI CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Single source of truth for the Swift toolchain version across every job — bump this one value to move
# the whole matrix at once. GitHub doesn't expose `env` to a job's `container:` field, so the `config`
# job below republishes it as an output that the Linux container images (and every other job) read via
# `needs.config.outputs.swift`.
env:
  SWIFT_VERSION: "6.2"

# The reactive core (HopGraph) and the view-graph/reconciler (HopUI) have no native-toolkit dependency.
# macOS builds & tests every toolkit (AppKit + GTK4 + Qt) in one job. Linux and Windows split into
# per-toolkit jobs: `HOP_TOOLKIT=gtk|qt` (read by Package.swift) keeps only that toolkit's targets in
# the build graph, so each runner installs and exercises ONLY its toolkit — a GTK runner never needs Qt,
# and a Qt runner never needs GTK.

jobs:
  # Republishes the workflow-level SWIFT_VERSION as a job output. Needed only because `container:`
  # can't read the `env` context; every job depends on this so they all share the one version.
  config:
    name: Resolve Swift version
    runs-on: ubuntu-latest
    outputs:
      swift: ${{ steps.resolve.outputs.swift }}
    steps:
      - id: resolve
        run: echo "swift=${{ env.SWIFT_VERSION }}" >> "$GITHUB_OUTPUT"

  macos:
    name: macOS (AppKit + GTK4 + Qt)
    needs: config
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: Install Swift ${{ needs.config.outputs.swift }}
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ needs.config.outputs.swift }}
      - name: Install GTK4 and Qt
        run: brew install gtk4 pkg-config qt
      - name: Test (all toolkits)
        run: swift test
      - name: Build (all toolkits)
        run: swift build

  linux-gtk:
    name: Linux (GTK4)
    needs: config
    runs-on: ubuntu-latest
    container: swift:${{ needs.config.outputs.swift }}
    env:
      HOP_TOOLKIT: gtk
    steps:
      - uses: actions/checkout@v6
      - name: Install GTK4
        run: |
          apt-get update
          apt-get install -y libgtk-4-dev pkg-config
      - name: Test (GTK4)
        run: swift test
      - name: Build (GTK4)
        run: swift build

  linux-qt:
    name: Linux (Qt)
    needs: config
    runs-on: ubuntu-latest
    container: swift:${{ needs.config.outputs.swift }}
    env:
      HOP_TOOLKIT: qt
    steps:
      - uses: actions/checkout@v6
      # Qt6 dev headers/libs land in the Debian multiarch paths Package.swift defaults to on Linux
      # (/usr/include/x86_64-linux-gnu/qt6, /usr/lib/x86_64-linux-gnu); override QT_ROOT for other layouts.
      - name: Install Qt6
        run: |
          apt-get update
          apt-get install -y qt6-base-dev
      - name: Test (Qt)
        run: swift test
      - name: Build (Qt)
        run: swift build

  windows-gtk:
    name: Windows (GTK4)
    needs: config
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    env:
      HOP_TOOLKIT: gtk
    steps:
      - uses: actions/checkout@v6
      - name: Install Swift toolchain
        uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-${{ needs.config.outputs.swift }}-release
          tag: ${{ needs.config.outputs.swift }}-RELEASE
      # GTK4 on Windows is provided by MSYS2/mingw-w64; pkg-config resolves the same way as on
      # macOS/Linux once PKG_CONFIG_PATH and PATH point at the mingw64 prefix.
      - name: Install GTK4 (MSYS2)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-pkgconf
      - name: Test (GTK4)
        env:
          PKG_CONFIG_PATH: D:\a\_temp\msys64\mingw64\lib\pkgconfig
          PATH: D:\a\_temp\msys64\mingw64\bin;${{ env.PATH }}
        run: swift test
      - name: Build (GTK4)
        env:
          PKG_CONFIG_PATH: D:\a\_temp\msys64\mingw64\lib\pkgconfig
          PATH: D:\a\_temp\msys64\mingw64\bin;${{ env.PATH }}
        run: swift build

  windows-qt:
    name: Windows (Qt)
    needs: config
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    env:
      HOP_TOOLKIT: qt
    steps:
      - uses: actions/checkout@v6
      - name: Install Swift toolchain
        uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-${{ needs.config.outputs.swift }}-release
          tag: ${{ needs.config.outputs.swift }}-RELEASE
      # The official Qt build for MSVC; install-qt-action exports QT_ROOT_DIR and puts the Qt DLLs on PATH
      # (needed at test-run time). Package.swift reads QT_ROOT for its Windows include/lib flags.
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
      - name: Test (Qt)
        env:
          QT_ROOT: ${{ env.QT_ROOT_DIR }}
        run: swift test
      - name: Build (Qt)
        env:
          QT_ROOT: ${{ env.QT_ROOT_DIR }}
        run: swift build

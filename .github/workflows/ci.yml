name: HopUI CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The reactive core (HopGraph) and the view-graph/reconciler (HopUI) have no native-toolkit dependency.
# macOS builds & tests every toolkit (AppKit + GTK4 + Qt) in one job. Linux and Windows split into
# per-toolkit jobs: `HOP_TOOLKIT=gtk|qt|winui` (read by Package.swift) keeps only that toolkit's targets
# in the build graph, so each runner installs and exercises ONLY its toolkit — a GTK runner never needs
# Qt, and a Qt runner never needs GTK. Windows additionally has a WinUI 3 job (the real Windows-native
# toolkit), which binds XAML controls through the swift-winui WinRT projections.

jobs:
  macos:
    name: macOS (AppKit + GTK4 + Qt)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Install Swift 6.3.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.3.2"
      - name: Install GTK4 and Qt
        run: brew install gtk4 pkg-config qt
      - name: Test (all toolkits)
        run: swift test
      - name: Build (all toolkits)
        run: swift build

  linux-gtk:
    name: Linux (GTK4)
    runs-on: ubuntu-latest
    container: swift:6.3.2
    env:
      HOP_TOOLKIT: gtk
    steps:
      - uses: actions/checkout@v6
      - name: Install GTK4
        run: |
          apt-get update
          apt-get install -y libgtk-4-dev pkg-config
      - name: Test (GTK4)
        run: swift test
      - name: Build (GTK4)
        run: swift build

  linux-qt:
    name: Linux (Qt)
    runs-on: ubuntu-latest
    container: swift:6.3.2
    env:
      HOP_TOOLKIT: qt
    steps:
      - uses: actions/checkout@v6
      # Qt6 dev headers/libs land in the Debian multiarch paths Package.swift defaults to on Linux
      # (/usr/include/x86_64-linux-gnu/qt6, /usr/lib/x86_64-linux-gnu); override QT_ROOT for other layouts.
      - name: Install Qt6
        run: |
          apt-get update
          apt-get install -y qt6-base-dev
      - name: Test (Qt)
        run: swift test
      - name: Build (Qt)
        run: swift build

  windows-winui:
    name: Windows (WinUI)
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    env:
      HOP_TOOLKIT: winui
    steps:
      - uses: actions/checkout@v6
      # WinUI is developed/validated against Swift 6.3.x, and the `#if compiler(>=6.3)` deinit workaround
      # in HopUI targets it (Swift 6.3's SILGen crashes synthesizing the isolating destructor of a generic
      # MainActor class).
      - name: Install Swift toolchain
        uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.3.2-release
          tag: 6.3.2-RELEASE
      # The WinUI 3 toolkit binds real XAML controls through the swift-winui WinRT projections
      # (https://github.com/hoptools/swift-winui). Package.swift references it as a sibling path dependency
      # (`../swift-winui`), so check it out next to the hop repo. Pinned to a known-good commit for
      # reproducibility; bump as the projections advance.
      - name: Check out swift-winui (sibling path dependency)
        run: git clone --depth 1 https://github.com/hoptools/swift-winui.git ..\swift-winui
      # Building the projections needs a Windows SDK whose version is >= the one the bindings were generated
      # against (10.0.17763); windows-latest ships a newer SDK that is compatible. `swift test` runs the
      # core suite (HopGraph + HopUI) plus the toolkit's runtime-free conversion tests (HopWinUITests),
      # none of which activate WinRT, so no Windows App Runtime is required at test time. `swift build` then
      # compiles the HopWinUI library and the hop-demo-winui executable.
      - name: Test (core + WinUI helpers)
        run: swift test
      - name: Build (WinUI toolkit + demo)
        run: swift build

  windows-qt:
    name: Windows (Qt)
    # Pinned to windows-2022 (VS 2022 / MSVC 14.4x), a stable toolset that works with the Swift
    # toolchain's bundled Clang. `windows-latest` moved to a VS 18 / MSVC 14.51 toolset whose STL
    # hard-gates on a very recent Clang ("STL1000: Unexpected compiler version, expected Clang 20 or
    # newer"), which the toolchain's Clang may not satisfy.
    runs-on: windows-2022
    defaults:
      run:
        shell: cmd
    env:
      HOP_TOOLKIT: qt
    steps:
      - uses: actions/checkout@v6
      - name: Install Swift toolchain
        uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.3.2-release
          tag: 6.3.2-RELEASE
      # The official Qt build for MSVC; install-qt-action exports QT_ROOT_DIR and puts the Qt DLLs on PATH
      # (needed at test-run time). Package.swift reads QT_ROOT for its Windows include/lib flags.
      # NOTE: Qt only ships the `win64_msvc2022_64` prebuilt binaries (matching the runner's MSVC 2022)
      # from Qt 6.8 onward — 6.7 and earlier offer only `win64_msvc2019_64`, so the version and arch are
      # coupled here. 6.8+ also has QStyleHints::setColorScheme, which CQt's shim uses when available.
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
      - name: Test (Qt)
        env:
          QT_ROOT: ${{ env.QT_ROOT_DIR }}
        run: swift test
      - name: Build (Qt)
        env:
          QT_ROOT: ${{ env.QT_ROOT_DIR }}
        run: swift build

name: HopUI CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The reactive core (HopGraph) and the view-graph/reconciler (HopUI) have no native-toolkit dependency.
# Every platform splits into per-toolkit jobs driven by `HOP_TOOLKIT` (read by Package.swift), which keeps
# only that toolkit's targets in the build graph — so each runner installs and exercises ONLY its toolkit
# (a GTK runner never needs Qt, an AppKit runner never needs GTK). macOS supports four backends — AppKit,
# the native-SwiftUI reference demo (`HOP_TOOLKIT=swiftui`), GTK4, and Qt — one job each. Linux supports
# GTK4 + Qt; Windows supports WinUI 3 (the real Windows-native toolkit, bound through the CWinUI C++/WinRT
# shim) + Qt. The toolkit-independent HopGraph/HopUI test suite runs in each non-reference toolkit job.

jobs:
  macos-appkit:
    name: macOS (AppKit)
    runs-on: macos-15
    env:
      HOP_TOOLKIT: appkit
    steps:
      - uses: actions/checkout@v6
      - name: Install Swift 6.3.2
        uses: swift-actions/setup-swift@main
        with:
          swift-version: "6.3.2"
      # AppKit is part of the macOS SDK, so no toolkit install is needed.
      - name: Test (AppKit)
        run: swift test
      - name: Build (AppKit)
        run: swift build
      - name: Screenshot playgrounds (AppKit)
        continue-on-error: true
        run: scripts/ci/screenshot-playgrounds.sh ci-screenshots appkit
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-macos-appkit
          path: ci-screenshots
          if-no-files-found: warn
      # Assemble the app into an installable .dmg, upload it, then install + launch it to prove it runs.
      - name: Package installer (hopdemo-macos-aarch64-appkit.dmg)
        run: swift run hoppack package --target macos-aarch64-appkit --output dist/hopdemo-macos-aarch64-appkit.dmg
      - name: Upload installer
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hopdemo-macos-aarch64-appkit.dmg
          path: dist/hopdemo-macos-aarch64-appkit.dmg
          if-no-files-found: warn
      - name: Install & launch
        run: scripts/ci/macos-install-launch.sh dist/hopdemo-macos-aarch64-appkit.dmg

  macos-swiftui:
    name: macOS (SwiftUI reference)
    runs-on: macos-15
    env:
      HOP_TOOLKIT: swiftui
    steps:
      - uses: actions/checkout@v6
      - name: Install Swift 6.3.2
        uses: swift-actions/setup-swift@main
        with:
          swift-version: "6.3.2"
      # The SwiftUI backend is the reference demo (Apple's SwiftUI, no HopUI toolkit): it only needs to
      # compile + render. The toolkit-independent HopGraph/HopUI test suite runs in the AppKit/GTK4/Qt jobs.
      - name: Build (SwiftUI reference demo)
        run: swift build
      - name: Screenshot playgrounds (SwiftUI)
        continue-on-error: true
        run: scripts/ci/screenshot-playgrounds.sh ci-screenshots swiftui
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-macos-swiftui
          path: ci-screenshots
          if-no-files-found: warn
      - name: Package installer (hopdemo-macos-aarch64-swiftui.dmg)
        run: swift run hoppack package --target macos-aarch64-swiftui --output dist/hopdemo-macos-aarch64-swiftui.dmg
      - name: Upload installer
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hopdemo-macos-aarch64-swiftui.dmg
          path: dist/hopdemo-macos-aarch64-swiftui.dmg
          if-no-files-found: warn
      - name: Install & launch
        run: scripts/ci/macos-install-launch.sh dist/hopdemo-macos-aarch64-swiftui.dmg

  macos-gtk:
    name: macOS (GTK4)
    runs-on: macos-15
    env:
      HOP_TOOLKIT: gtk
    steps:
      - uses: actions/checkout@v6
      - name: Install Swift 6.3.2
        uses: swift-actions/setup-swift@main
        with:
          swift-version: "6.3.2"
      - name: Install GTK4
        run: brew install gtk4 pkg-config
      - name: Test (GTK4)
        run: swift test
      - name: Build (GTK4)
        run: swift build
      - name: Screenshot playgrounds (GTK4)
        continue-on-error: true
        run: scripts/ci/screenshot-playgrounds.sh ci-screenshots gtk4
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-macos-gtk
          path: ci-screenshots
          if-no-files-found: warn
      - name: Package installer (hopdemo-macos-aarch64-gtk4.dmg)
        run: swift run hoppack package --target macos-aarch64-gtk4 --output dist/hopdemo-macos-aarch64-gtk4.dmg
      - name: Upload installer
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hopdemo-macos-aarch64-gtk4.dmg
          path: dist/hopdemo-macos-aarch64-gtk4.dmg
          if-no-files-found: warn
      - name: Install & launch
        run: scripts/ci/macos-install-launch.sh dist/hopdemo-macos-aarch64-gtk4.dmg

  macos-qt:
    name: macOS (Qt)
    runs-on: macos-15
    env:
      HOP_TOOLKIT: qt
    steps:
      - uses: actions/checkout@v6
      - name: Install Swift 6.3.2
        uses: swift-actions/setup-swift@main
        with:
          swift-version: "6.3.2"
      - name: Install Qt
        run: brew install qt
      - name: Test (Qt)
        run: swift test
      - name: Build (Qt)
        run: swift build
      - name: Screenshot playgrounds (Qt)
        continue-on-error: true
        run: scripts/ci/screenshot-playgrounds.sh ci-screenshots qt
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-macos-qt
          path: ci-screenshots
          if-no-files-found: warn
      - name: Package installer (hopdemo-macos-aarch64-qt.dmg)
        run: swift run hoppack package --target macos-aarch64-qt --output dist/hopdemo-macos-aarch64-qt.dmg
      - name: Upload installer
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hopdemo-macos-aarch64-qt.dmg
          path: dist/hopdemo-macos-aarch64-qt.dmg
          if-no-files-found: warn
      - name: Install & launch
        run: scripts/ci/macos-install-launch.sh dist/hopdemo-macos-aarch64-qt.dmg

  # The Linux jobs run directly on the runner (NOT in the swift container) so flatpak/flatpak-builder have the
  # bubblewrap user-namespace privileges they need to build + install the flatpak. Swift is installed onto the
  # host instead. The GTK4 flatpak runs on the GNOME runtime (which ships GTK4); the Swift runtime is bundled.
  linux-gtk:
    name: Linux (GTK4)
    runs-on: ubuntu-latest
    env:
      HOP_TOOLKIT: gtk
    steps:
      - uses: actions/checkout@v6
      - name: Install Swift 6.3.2
        uses: swift-actions/setup-swift@main
        with:
          swift-version: "6.3.2"
      - name: Install GTK4, flatpak (+ Xvfb/ImageMagick)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev pkg-config \
            xvfb x11-utils x11-apps xdotool imagemagick fonts-dejavu-core libgl1-mesa-dri adwaita-icon-theme \
            flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//46 org.gnome.Sdk//46
      - name: Test (GTK4)
        run: swift test
      - name: Build (GTK4)
        run: swift build
      - name: Screenshot playgrounds (GTK4)
        continue-on-error: true
        run: scripts/ci/screenshot-playgrounds.sh ci-screenshots gtk4
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-linux-gtk
          path: ci-screenshots
          if-no-files-found: warn
      - name: Package installer (hopdemo-linux-x86_64-gtk4.flatpak)
        run: swift run hoppack package --target linux-x86_64-gtk4 --output dist/hopdemo-linux-x86_64-gtk4.flatpak
      - name: Upload installer
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hopdemo-linux-x86_64-gtk4.flatpak
          path: dist/hopdemo-linux-x86_64-gtk4.flatpak
          if-no-files-found: warn
      - name: Install & launch
        run: scripts/ci/linux-install-launch.sh dist/hopdemo-linux-x86_64-gtk4.flatpak

  linux-qt:
    name: Linux (Qt)
    runs-on: ubuntu-latest
    env:
      HOP_TOOLKIT: qt
    steps:
      - uses: actions/checkout@v6
      - name: Install Swift 6.3.2
        uses: swift-actions/setup-swift@main
        with:
          swift-version: "6.3.2"
      # Qt6 dev headers/libs land in the Debian multiarch paths Package.swift defaults to on Linux
      # (/usr/include/x86_64-linux-gnu/qt6, /usr/lib/x86_64-linux-gnu); override QT_ROOT for other layouts.
      # The Qt flatpak runs on the KDE runtime (which ships Qt6); the Swift runtime is bundled.
      - name: Install Qt6, flatpak (+ Xvfb/ImageMagick)
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev \
            xvfb x11-utils x11-apps xdotool imagemagick fonts-dejavu-core libgl1 libxkbcommon-x11-0 libxcb-cursor0 \
            flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.kde.Platform//6.7 org.kde.Sdk//6.7
      - name: Test (Qt)
        run: swift test
      - name: Build (Qt)
        run: swift build
      - name: Screenshot playgrounds (Qt)
        continue-on-error: true
        run: scripts/ci/screenshot-playgrounds.sh ci-screenshots qt
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-linux-qt
          path: ci-screenshots
          if-no-files-found: warn
      - name: Package installer (hopdemo-linux-x86_64-qt.flatpak)
        run: swift run hoppack package --target linux-x86_64-qt --output dist/hopdemo-linux-x86_64-qt.flatpak
      - name: Upload installer
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hopdemo-linux-x86_64-qt.flatpak
          path: dist/hopdemo-linux-x86_64-qt.flatpak
          if-no-files-found: warn
      - name: Install & launch
        run: scripts/ci/linux-install-launch.sh dist/hopdemo-linux-x86_64-qt.flatpak

  windows-winui:
    name: Windows (WinUI)
    # Pinned to windows-2022 (VS 2022 / MSVC 14.4x), like the GTK4/Qt Windows jobs: windows-latest's newer
    # MSVC STL requires Clang 20+, but the Swift 6.3 toolchain ships Clang 19, so compiling the C++/WinRT
    # shim there would fail with "STL1000: Unexpected compiler version".
    runs-on: windows-2022
    defaults:
      run:
        shell: cmd
    env:
      HOP_TOOLKIT: winui
    steps:
      - uses: actions/checkout@v6
      # WinUI is developed/validated against Swift 6.3.x, and the `#if compiler(>=6.3)` deinit workaround
      # in HopUI targets it (Swift 6.3's SILGen crashes synthesizing the isolating destructor of a generic
      # MainActor class).
      - name: Install Swift toolchain
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.3.2-release
          swift-build: 6.3.2-RELEASE
      # WinUI 3 has no C ABI, so HopWinUI talks to it through the CWinUI C++/WinRT shim (no projection
      # dependency). setup-winui.ps1 NuGet-restores the Windows App SDK + WebView2, runs the Windows SDK's
      # cppwinrt to generate the WinUI projection headers, and stages headers/import-libs/bootstrap into
      # `.winui/` (read by Package.swift). shell: pwsh so the .ps1 actually runs (the job default is cmd).
      - name: Stage WinUI (.winui) via cppwinrt
        shell: pwsh
        run: ./scripts/setup-winui.ps1 -Arch x64
      # `swift test` runs the core suite (HopGraph + HopUI), which doesn't link the shim, so no Windows App
      # Runtime is needed at test time. `swift build` then compiles the CWinUI shim + HopWinUI + the demo.
      - name: Test (core)
        run: swift test
      - name: Build (CWinUI shim + WinUI toolkit + demo)
        run: swift build
      - name: Screenshot playgrounds (WinUI)
        continue-on-error: true
        shell: pwsh
        run: ./scripts/ci/screenshot-playgrounds.ps1 -OutDir ci-screenshots -Toolkits winui
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-windows-winui
          path: ci-screenshots
          if-no-files-found: warn
      # makeappx + signtool live in the Windows SDK bin (not on PATH by default); add the newest to PATH.
      - name: Add Windows SDK tools to PATH
        shell: pwsh
        run: |
          $t = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\makeappx.exe" | Sort-Object FullName -Descending | Select-Object -First 1
          Add-Content $env:GITHUB_PATH (Split-Path $t.FullName)
      # Stage the Windows App SDK runtime DLLs so hoppack bundles them into the MSIX (hoppack.yaml's
      # windows-x86_64-winui bundlelibraries: [.winui/runtime]) — the app then runs without a runtime install.
      - name: Stage Windows App SDK runtime (.winui/runtime)
        shell: pwsh
        run: |
          $pkg = Get-ChildItem .winui/packages -Directory -Filter "Microsoft.WindowsAppSDK.*" | Select-Object -First 1
          New-Item -ItemType Directory -Force .winui/runtime | Out-Null
          Copy-Item (Join-Path $pkg.FullName "runtimes/win-x64/native/*") .winui/runtime/ -Force -ErrorAction SilentlyContinue
      - name: Package installer (hopdemo-windows-x86_64-winui.msix)
        shell: pwsh
        run: swift run hoppack package --target windows-x86_64-winui --output dist/hopdemo-windows-x86_64-winui.msix
      - name: Upload installer
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hopdemo-windows-x86_64-winui.msix
          path: dist/hopdemo-windows-x86_64-winui.msix
          if-no-files-found: warn
      - name: Install & launch
        # Windows PowerShell 5.1: the Appx module (Add-AppxPackage) can't load under PowerShell 7 (pwsh).
        shell: powershell
        run: ./scripts/ci/windows-install-launch.ps1 -Msix dist/hopdemo-windows-x86_64-winui.msix

  windows-qt:
    name: Windows (Qt)
    # Pinned to windows-2022 (VS 2022 / MSVC 14.4x), a stable toolset that works with the Swift
    # toolchain's bundled Clang. `windows-latest` moved to a VS 18 / MSVC 14.51 toolset whose STL
    # hard-gates on a very recent Clang ("STL1000: Unexpected compiler version, expected Clang 20 or
    # newer"), which the toolchain's Clang may not satisfy.
    runs-on: windows-2022
    defaults:
      run:
        shell: cmd
    env:
      HOP_TOOLKIT: qt
    steps:
      - uses: actions/checkout@v6
      - name: Install Swift toolchain
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.3.2-release
          swift-build: 6.3.2-RELEASE
      # The official Qt build for MSVC; install-qt-action exports QT_ROOT_DIR and puts the Qt DLLs on PATH
      # (needed at test-run time). Package.swift reads QT_ROOT for its Windows include/lib flags.
      # NOTE: Qt only ships the `win64_msvc2022_64` prebuilt binaries (matching the runner's MSVC 2022)
      # from Qt 6.8 onward — 6.7 and earlier offer only `win64_msvc2019_64`, so the version and arch are
      # coupled here. 6.8+ also has QStyleHints::setColorScheme, which CQt's shim uses when available.
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
      - name: Test (Qt)
        env:
          QT_ROOT: ${{ env.QT_ROOT_DIR }}
        run: swift test
      - name: Build (Qt)
        env:
          QT_ROOT: ${{ env.QT_ROOT_DIR }}
        run: swift build
      - name: Screenshot playgrounds (Qt)
        continue-on-error: true
        shell: pwsh
        env:
          QT_ROOT: ${{ env.QT_ROOT_DIR }}
        run: ./scripts/ci/screenshot-playgrounds.ps1 -OutDir ci-screenshots -Toolkits qt
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-windows-qt
          path: ci-screenshots
          if-no-files-found: warn
      - name: Add Windows SDK tools to PATH
        shell: pwsh
        run: |
          $t = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\makeappx.exe" | Sort-Object FullName -Descending | Select-Object -First 1
          Add-Content $env:GITHUB_PATH (Split-Path $t.FullName)
      # hoppack runs windeployqt (on PATH via install-qt-action) to stage Qt's DLLs + plugins, and bundles
      # the Swift runtime DLLs, so the MSIX is self-contained.
      - name: Package installer (hopdemo-windows-x86_64-qt.msix)
        shell: pwsh
        env:
          QT_ROOT: ${{ env.QT_ROOT_DIR }}
        run: swift run hoppack package --target windows-x86_64-qt --output dist/hopdemo-windows-x86_64-qt.msix
      - name: Upload installer
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hopdemo-windows-x86_64-qt.msix
          path: dist/hopdemo-windows-x86_64-qt.msix
          if-no-files-found: warn
      - name: Install & launch
        # Windows PowerShell 5.1: the Appx module (Add-AppxPackage) can't load under PowerShell 7 (pwsh).
        shell: powershell
        run: ./scripts/ci/windows-install-launch.ps1 -Msix dist/hopdemo-windows-x86_64-qt.msix

  # After every platform/toolkit job, collect their screenshot artifacts into one static gallery (each
  # playground shown side-by-side across backends) and publish it to GitHub Pages. Requires the repo's
  # Pages source to be set to "GitHub Actions" (Settings → Pages). Runs on main only; `always()` so the
  # gallery still builds from whatever succeeded if some toolkit job failed.
  pages:
    name: Publish screenshot gallery
    needs: [macos-appkit, macos-swiftui, macos-gtk, macos-qt, linux-gtk, linux-qt, windows-winui, windows-qt]
    if: ${{ always() && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - name: Download all screenshot artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: screenshots-*
          path: artifacts
      - name: Build gallery
        run: python3 scripts/ci/build-gallery.py artifacts _site --title "HopUI · Playground Screenshots"
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
